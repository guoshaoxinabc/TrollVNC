name: Build TrollVNC

on:
  push:
    branches: [release]
  workflow_dispatch:
    inputs:
      is_managed:
        type: boolean
        description: Build with a bundled Managed.plist
        required: false
        default: false
      # ...（其他 inputs 保持不变）
      desktop_name:
        type: string
        description: Desktop name shown to clients
        required: false
        default: TrollVNC
      # （省略中间部分，保持你原来的所有 inputs）

env:
  FINALPACKAGE: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        scheme: ["default", "rootless", "roothide", "bootstrap"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcbeautify ldid-procursus p7zip make
          brew install sourcelocation/formulae/deb-to-ipa || true   # 新增：deb转ipa工具

      - name: Checkout roothide/theos
        uses: actions/checkout@v4
        with:
          repository: roothide/theos
          path: theos-roothide
          submodules: recursive

      - name: Install iOS SDKs
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos-roothide
          cd theos-roothide
          ./bin/install-sdk iPhoneOS16.5
          ./bin/install-sdk iPhoneOS14.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Generate Managed.plist (managed build)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.is_managed == true }}
        env:
          # 保持你原来的所有 TVNC_ 变量
          TVNC_DESKTOP_NAME: ${{ inputs.desktop_name }}
          # ...（保持不变）
        run: |
          bash devkit/gen-managed-plist.sh

      - name: Build package (${{ matrix.scheme }})
        run: |
          source devkit/${{ matrix.scheme }}.sh
          FINALPACKAGE=1 gmake clean package

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/dsym-${{ matrix.scheme }}
          mkdir -p artifacts/packages-${{ matrix.scheme }}

          if [ -d ".theos/obj" ]; then
            find .theos/obj -name "*.dSYM" -exec cp -r {} artifacts/dsym-${{ matrix.scheme }}/ \;
          fi

          if [ -d "packages" ]; then
            if [ "${{ matrix.scheme }}" == "bootstrap" ]; then
              cp -r packages/*.tipa artifacts/packages-${{ matrix.scheme }}/
            else
              cp -r packages/*.deb artifacts/packages-${{ matrix.scheme }}/
            fi
          fi

      # ==================== 新增：生成 IPA ====================
      - name: Create IPA for SideStore (default scheme)
        if: matrix.scheme == 'default'
        run: |
          mkdir -p artifacts/ipa-default
          
          echo "=== Creating IPA from default build ==="
          
          # 方法1：使用 deb-to-ipa 工具（推荐）
          if [ -f "packages/com.82flex.trollvnc_*.deb" ]; then
            deb-to-ipa packages/com.82flex.trollvnc_*.deb -o artifacts/ipa-default/
          fi

          # 如果上面失败，尝试直接打包 Payload
          if [ ! -f "artifacts/ipa-default/*.ipa" ] && [ -d ".theos/_/Applications/TrollVNC.app" ]; then
            echo "Fallback: Creating IPA manually..."
            cd .theos/_
            mkdir -p Payload
            cp -r Applications/TrollVNC.app Payload/
            zip -r "$GITHUB_WORKSPACE/artifacts/ipa-default/TrollVNC.ipa" Payload
          fi

      - name: Upload dSYM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dsym-${{ matrix.scheme }}
          path: artifacts/dsym-${{ matrix.scheme }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.scheme }}
          path: artifacts/packages-${{ matrix.scheme }}

      - name: Upload IPA artifact
        if: matrix.scheme == 'default'
        uses: actions/upload-artifact@v4
        with:
          name: ipa-default
          path: artifacts/ipa-default
